# =============================================================================
# ohos.conf — configuration for ohos.sh
# Sourced as shell script. Use KEY=VALUE format, no spaces around '='.
# =============================================================================

# ---- Mirror URLs -------------------------------------------------------------
# npm registry (replaces https://repo.huaweicloud.com/repository/npm/)
NPM_REGISTRY="http://tsnnlx12bs02.ad.telmast.com:8081/repository/huaweicloud"

# @ohos scoped npm registry (replaces https://repo.harmonyos.com/npm/)
OHOS_NPM_REGISTRY="http://tsnnlx12bs02.ad.telmast.com:8081/harmonyos/"

# ohpm registry (replaces https://repo.harmonyos.com/ohpm/)
OHPM_REGISTRY="http://tsnnlx12bs02.ad.telmast.com:8081/repository/ohpm/"

# PyPI index (replaces http://repo.huaweicloud.com/repository/pypi/simple)
PYPI_URL="http://tsnnlx12bs02.ad.telmast.com:8081/repository/pypi/simple/"

# Trusted host for pip (extracted from PYPI_URL automatically if empty)
TRUSTED_HOST="tsnnlx12bs02.ad.telmast.com"

# @koalaui / @azanat / @arkoala / @panda / @idlizer scoped npm registry
KOALA_NPM_REGISTRY="http://tsnnlx12bs02.ad.telmast.com:8081/repository/koala-npm/"

# ---- Optional public/default registry profile --------------------------------
# Used by: `ohos npmrc original`
# Also used by sync/build if OHOS_SYNC_NPMRC_PROFILE="original".
ORIGINAL_NPM_REGISTRY="https://repo.huaweicloud.com/repository/npm/"
ORIGINAL_OHOS_NPM_REGISTRY="https://repo.harmonyos.com/npm/"
ORIGINAL_OHPM_REGISTRY="https://repo.harmonyos.com/ohpm/"
OHPM_PUBLISH_REGISTRY="https://ohpm.openharmony.cn/ohpm/"

# For private koala scopes there is no universal public default in this repo.
# Set ORIGINAL_KOALA_NPM_REGISTRY explicitly if your "original" profile should
# use a non-mirror private registry. If left empty, ohos.sh falls back to the
# current KOALA_NPM_REGISTRY value.
ORIGINAL_KOALA_NPM_REGISTRY=""

# Which npmrc profile sync/build should use when swapping ~/.npmrc.
# Supported values: mirror, original
OHOS_SYNC_NPMRC_PROFILE="mirror"

# ---- Repo source -------------------------------------------------------------
REPO_MANIFEST_URL="https://gitcode.com/openharmony/manifest.git"
REPO_REFERENCE="/data/shared/ohos_mirror"
LFS_MIRROR="/data/shared/ohos_mirror"
REPO_INSTALL_URL="https://gitee.com/oschina/repo/raw/fork_flow/repo-py3"

# ---- Node / prebuilts bootstrap ----------------------------------------------
# Used when repo / nvm / npm are missing and the script offers installation.
NVM_INSTALL_URL="https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh"

# The script ensures a sibling link one directory above the repo root:
#   ../openharmony_prebuilts -> /data/shared/openharmony_prebuilts
SHARED_PREBUILTS_DIR="/data/shared/openharmony_prebuilts"
PREBUILTS_SYMLINK_NAME="openharmony_prebuilts"

# ---- HTTP proxy (fallback) ---------------------------------------------------
# Used ONLY when direct download fails (timeout/connection error).
# Direct connection is always tried first.
# Leave empty to disable proxy fallback.
OHOS_PROXY="http://tsnnlx12as01:10811"

# Timeout in seconds for direct connection before falling back to proxy.
OHOS_PROXY_CONNECT_TIMEOUT=15

# Hosts that should NEVER go through proxy (comma-separated).
OHOS_NO_PROXY="tsnnlx12bs02.ad.telmast.com,localhost,127.0.0.1"

# ---- Parallelism -------------------------------------------------------------
REPO_SYNC_JOBS=64
LFS_JOBS=64
RESET_JOBS=64

# ---- Build aliases -----------------------------------------------------------
# Format: BUILD_<ALIAS>="<build.sh arguments>"
# Used by: ohos build <alias>
BUILD_SDK="--product-name ohos-sdk --ccache"
BUILD_SDK_LINUX="--product-name ohos-sdk --gn-args sdk_platform=linux --ccache"
BUILD_SDK_WIN="--product-name ohos-sdk --gn-args sdk_platform=win --ccache"
BUILD_RK3568="--product-name rk3568 --ccache"

# ---- ccache -----------------------------------------------------------------
# Shared compiler cache for OpenHarmony builds.
CCACHE_DIR="/data/shared/CCACHE/.ccache"
CCACHE_MAXSIZE="200G"

# ---- Sync command ------------------------------------------------------------
SYNC_CMD="repo sync -j {REPO_SYNC_JOBS} --optimized-fetch --current-branch --retry-fetches=5"
LFS_CMD="repo forall -j {LFS_JOBS} -c 'git config lfs.storage {LFS_MIRROR}/\$REPO_PROJECT.git/lfs/objects && git lfs fetch && git lfs checkout'"

# ---- Reset command -----------------------------------------------------------
# Steps: clean, reset, [lfs-prune], [gc], rm-artifacts, sync
# lfs-prune and gc are SKIPPED by default (slow and unnecessary with shared LFS mirror).
# Use 'ohos gc' to run them explicitly when you want to reclaim disk space.
RESET_LFS_PRUNE=false
RESET_GC=false
RESET_RM_DIRS="out prebuilts"

# ---- GC / maintenance --------------------------------------------------------
GC_LFS_PRUNE=true
GC_GIT_GC=true
GC_JOBS=32

# ---- Download roots ----------------------------------------------------------
# Destination directories for 'ohos download sdk|firmware'.
# Archive filenames include the build tag automatically.
SDK_DOWNLOAD_ROOT="/data/shared/common/sdk"
FIRMWARE_DOWNLOAD_ROOT="/data/shared/common/firmwares"

# ---- Shared flashing tools ---------------------------------------------------
# Default helper binaries used by 'ohos xts flash' when the user does not pass
# --flash-py-path / --hdc-path explicitly.
FLASH_PY_PATH="/data/shared/common/tools/flash.py"
HDC_PATH="/data/shared/common/tools/hdc"
# Optional directory with shared libraries needed by HDC, for example the
# folder that contains libusb_shared.so. Leave empty to let the wrapper try
# the HDC directory and common SDK/toolchains locations automatically.
HDC_LIBRARY_PATH=""

# Optional remote HDC endpoint for devices exposed from another machine, for
# example a Windows PC forwarding its local HDC service back to this server.
# Leave empty for local USB-connected devices.
XTS_HDC_ENDPOINT=""

# Default directory for generated Windows bridge bundles.
XTS_WINDOWS_BRIDGE_OUTPUT_ROOT="$HOME/ohos-xts-bridge"

# Optional default OpenHarmony workspace root for helper commands launched
# outside the repo tree, for example `ohos xts ...` from $HOME over SSH.
# Leave empty to let the wrapper try the current directory and common defaults
# like $HOME/proj/ohos_master.
OHOS_REPO_ROOT=""

# ---- Init command ------------------------------------------------------------
INIT_BRANCH="master"
INIT_EXTRA_ARGS="--no-repo-verify"
